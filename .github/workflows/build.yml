name: Build Firmware

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive  # Fetch all submodules

    - name: Initialize Submodules
      run: |
        git submodule sync --recursive
        git submodule update --init --force --depth=1 --recursive
        # Validate and add missing submodules
        if [ ! -d "src/libs/arduinoFFT" ] || [ ! -f "src/libs/arduinoFFT/.git" ]; then
          echo "arduinoFFT submodule missing or not initialized, adding..."
          rm -rf src/libs/arduinoFFT
          git submodule add https://github.com/kosme/arduinoFFT.git src/libs/arduinoFFT
          git submodule update --init src/libs/arduinoFFT
          (cd src/libs/arduinoFFT && git checkout master)
        fi
        # Validate FreeRTOS submodule
        if [ ! -d "src/libs/FreeRTOS" ] || [ ! -f "src/libs/FreeRTOS/croutine.c" ]; then
          echo "FreeRTOS submodule missing or not initialized, reinitializing..."
          rm -rf src/libs/FreeRTOS
          git submodule add https://github.com/FreeRTOS/FreeRTOS-Kernel.git src/libs/FreeRTOS
          git submodule update --init src/libs/FreeRTOS
          (cd src/libs/FreeRTOS && git checkout main)
        fi
        # Validate other submodules
        for dir in src/libs/littlefs src/libs/lvgl; do
          if [ ! -d "$dir" ] || [ ! -f "$dir/.git" ]; then
            echo "Submodule $dir missing or not initialized"
            exit 1
          fi
        done

    - name: Install Arm GCC Toolchain
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      id: arm-toolchain
      with:
        release: '10.3-2021.10'  # Match the observed toolchain version

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Download nRF5 SDK
      run: |
        wget -q --show-progress https://nsscprodmedia.blob.core.windows.net/prod/software-and-other-downloads/sdks/nrf5/binaries/nrf5_sdk_17.1.0_ddde560.zip || { echo "Download failed, using fallback"; exit 1; }
        unzip -q nrf5_sdk_17.1.0_ddde560.zip -d . || { echo "Unzip failed"; exit 1; }
        echo "NRF5_SDK_PATH=$(pwd)/nRF5_SDK_v17.1.0" >> $GITHUB_ENV

    - name: Configure CMake
      run: cmake -B build -G Ninja -DCMAKE_TOOLCHAIN_FILE=src/toolchain.cmake -DCMAKE_C_COMPILER=${{ steps.arm-toolchain.outputs.path }}/bin/arm-none-eabi-gcc -DCMAKE_CXX_COMPILER=${{ steps.arm-toolchain.outputs.path }}/bin/arm-none-eabi-g++ -CMAKE_ASM_COMPILER=${{ steps.arm-toolchain.outputs.path }}/bin/arm-none-eabi-gcc -DCMAKE_MAKE_PROGRAM=/usr/bin/ninja -DNRF5_SDK_PATH=$NRF5_SDK_PATH -DBOARD=pine_time_nrf52832 -DBUILD_DFU=1 -DBUILD_RESOURCES=1

    - name: Build
      run: ninja -C build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: praxiom
        path: build/praxiom.hex
