name: Build Firmware

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive  # Attempt to fetch all submodules

    - name: Initialize Submodules
      run: |
        git submodule sync --recursive
        # Force initialize FreeRTOS submodule with retries
        for i in {1..3}; do
          if [ ! -d "src/libs/FreeRTOS" ] || [ ! -f "src/libs/FreeRTOS/croutine.c" ]; then
            echo "Attempt $i: FreeRTOS submodule missing or not initialized, reinitializing..."
            rm -rf src/libs/FreeRTOS
            git submodule add --force https://github.com/FreeRTOS/FreeRTOS-Kernel.git src/libs/FreeRTOS || { echo "Submodule add failed"; continue; }
            git submodule update --init --force src/libs/FreeRTOS || { echo "Submodule update failed"; continue; }
            (cd src/libs/FreeRTOS && git checkout main && git pull --rebase) || { echo "Checkout/pull failed"; continue; }
            if [ -f "src/libs/FreeRTOS/croutine.c" ]; then
              echo "FreeRTOS initialized successfully on attempt $i"
              break
            fi
          else
            echo "FreeRTOS already initialized"
            break
          fi
        done
        if [ ! -f "src/libs/FreeRTOS/croutine.c" ]; then
          echo "Failed to initialize FreeRTOS after 3 attempts"
          exit 1
        fi
        # Initialize and validate other submodules
        git submodule update --init --force --depth=1 --recursive
        for dir in src/libs/arduinoFFT src/libs/littlefs src/libs/lvgl; do
          if [ ! -d "$dir" ] || [ ! -f "$dir/.git" ]; then
            echo "Submodule $dir missing or not initialized"
            exit 1
          fi
        done

    - name: Install Arm GCC Toolchain
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      id: arm-toolchain
      with:
        release: '10.3-2021.10'  # Match the observed toolchain version

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Download nRF5 SDK
      run: |
        wget -q --show-progress https://nsscprodmedia.blob.core.windows.net/prod/software-and-other-downloads/sdks/nrf5/binaries/nrf5_sdk_17.1.0_ddde560.zip || { echo "Download failed, using fallback"; exit 1; }
        unzip -q nrf5_sdk_17.1.0_ddde560.zip -d . || { echo "Unzip failed"; exit 1; }
        echo "NRF5_SDK_PATH=$(pwd)/nRF5_SDK_v17.1.0" >> $GITHUB_ENV

    - name: Configure CMake
      run: cmake -B build -G Ninja -DCMAKE_TOOLCHAIN_FILE=src/toolchain.cmake -DCMAKE_C_COMPILER=${{ steps.arm-toolchain.outputs.path }}/bin/arm-none-eabi-gcc -DCMAKE_CXX_COMPILER=${{ steps.arm-toolchain.outputs.path }}/bin/arm-none-eabi-g++ -CMAKE_ASM_COMPILER=${{ steps.arm-toolchain.outputs.path }}/bin/arm-none-eabi-gcc -DCMAKE_MAKE_PROGRAM=/usr/bin/ninja -DNRF5_SDK_PATH=$NRF5_SDK_PATH -DBOARD=pine_time_nrf52832 -DBUILD_DFU=1 -BUILD_RESOURCES=1

    - name: Build
      run: ninja -C build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: praxiom
        path: build/praxiom.hex
