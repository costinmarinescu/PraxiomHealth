name: Build PraxiomHealth
on:
  push:    { branches: [ main ] }
  pull_request: { branches: [ main ] }
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone InfiniTime core
        run: |
          rm -rf src/InfiniTime
          git clone --depth 1 https://github.com/InfiniTimeOrg/InfiniTime.git src/InfiniTime

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3-pip wget unzip nodejs npm
          pip3 install Pillow cbor lz4

      - name: Configure CMake
        run: |
          cmake -G Ninja \
            -S src \
            -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DARM_NONE_EABI_TOOLCHAIN_PATH=/opt/gcc-arm-none-eabi-10.3-2021.10 \
            -DNRF5_SDK_PATH=/opt/nRF5_SDK_15.3.0_59ac345

      - name: Build firmware
        run: ninja -C build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: praxiomhealth-firmware
          path: build/src/*.bin
