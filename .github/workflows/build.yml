name: Build PraxiomHealth Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build python3-pip wget unzip nodejs npm
        sudo npm install -g lv_font_conv@1.5.2

    - name: Download and install ARM GCC toolchain
      run: |
        wget -q https://developer.arm.com/-/media/Files/downloads/gnu-rm/10.3-2021.10/gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2
        tar -xjf gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2
        sudo mv gcc-arm-none-eabi-10.3-2021.10 /opt/
        rm gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2

    - name: Download and install nRF5 SDK
      run: |
        wget -q https://developer.nordicsemi.com/nRF5_SDK/nRF5_SDK_v15.x.x/nRF5_SDK_15.3.0_59ac345.zip
        unzip -q nRF5_SDK_15.3.0_59ac345.zip
        sudo mv nRF5_SDK_15.3.0_59ac345 /opt/
        rm nRF5_SDK_15.3.0_59ac345.zip

    - name: Verify toolchain installation
      run: |
        /opt/gcc-arm-none-eabi-10.3-2021.10/bin/arm-none-eabi-gcc --version
        ls -la /opt/nRF5_SDK_15.3.0_59ac345

    - name: Configure CMake
      run: |
        cmake -G "Unix Makefiles" \
          -S src \
          -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DARM_NONE_EABI_TOOLCHAIN_PATH=/opt/gcc-arm-none-eabi-10.3-2021.10 \
          -DNRF5_SDK_PATH=/opt/nRF5_SDK_15.3.0_59ac345 \
          -DUSE_OPENOCD=1 \
          -DBUILD_DFU=0 \
          -DBUILD_RESOURCES=1

    - name: Build firmware
      run: cmake --build build --parallel $(nproc)

    - name: List build artifacts
      run: |
        echo "=== Build Artifacts ==="
        ls -lh build/*.bin build/*.hex build/*.out 2>/dev/null || true
        echo "=== Build Directory ==="
        find build -name "*.bin" -o -name "*.hex" -o -name "*.zip"

    - name: Upload firmware binaries
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: praxiomhealth-firmware
        path: |
          build/src/pinetime-app*.bin
          build/src/pinetime-app*.hex
          build/src/pinetime-mcuboot*.bin
          build/src/*.zip
        retention-days: 30

    - name: Create release assets (on tag push)
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: release-firmware-${{ github.ref_name }}
        path: |
          build/src/pinetime-app*.bin
          build/src/pinetime-app*.hex
          build/src/pinetime-mcuboot*.bin
          build/src/*.zip
