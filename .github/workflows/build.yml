name: Build PraxiomHealth Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          python3 \
          python3-pip \
          wget \
          unzip \
          nodejs \
          npm
        # CRITICAL FIX: Install Pillow for image processing
        pip3 install Pillow
        sudo npm install -g lv_font_conv@1.5.2

    - name: Download ARM GCC toolchain
      run: |
        wget -q https://developer.arm.com/-/media/Files/downloads/gnu-rm/10.3-2021.10/gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2
        tar -xjf gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2
        sudo mv gcc-arm-none-eabi-10.3-2021.10 /opt/
        rm gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2

    - name: Download nRF5 SDK
      run: |
        wget -q https://developer.nordicsemi.com/nRF5_SDK/nRF5_SDK_v15.x.x/nRF5_SDK_15.3.0_59ac345.zip
        unzip -q nRF5_SDK_15.3.0_59ac345.zip
        sudo mv nRF5_SDK_15.3.0_59ac345 /opt/
        rm nRF5_SDK_15.3.0_59ac345.zip

    - name: Verify toolchain and SDK installation
      run: |
        echo "=== ARM GCC Toolchain ==="
        /opt/gcc-arm-none-eabi-10.3-2021.10/bin/arm-none-eabi-gcc --version
        echo ""
        echo "=== nRF5 SDK ==="
        ls -la /opt/nRF5_SDK_15.3.0_59ac345/components/softdevice/
        echo ""
        echo "=== Build Tools ==="
        cmake --version
        ninja --version
        lv_font_conv --version
        python3 -m pip show Pillow

    - name: Configure CMake with Ninja generator
      run: |
        cmake -G Ninja \
          -S src \
          -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DARM_NONE_EABI_TOOLCHAIN_PATH=/opt/gcc-arm-none-eabi-10.3-2021.10 \
          -DNRF5_SDK_PATH=/opt/nRF5_SDK_15.3.0_59ac345 \
          -DBUILD_DFU=0 \
          -DBUILD_RESOURCES=1

    - name: Build ONLY main firmware (skip recovery)
      run: |
        cd build
        ninja pinetime-app pinetime-mcuboot-app pinetime-mcuboot-app-image

    - name: List generated firmware files
      if: always()
      run: |
        echo "=== Build Artifacts ==="
        find build -type f \( -name "*.bin" -o -name "*.hex" -o -name "*.out" \) -ls

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: praxiomhealth-firmware-${{ github.sha }}
        path: |
          build/src/pinetime-app*.bin
          build/src/pinetime-app*.hex
          build/src/pinetime-app*.out
          build/src/pinetime-mcuboot-app*.bin
          build/src/pinetime-mcuboot-app*.hex
        retention-days: 90
        if-no-files-found: warn

    - name: Upload build logs (on failure)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-${{ github.sha }}
        path: |
          build/CMakeFiles/CMakeOutput.log
          build/CMakeFiles/CMakeError.log
        retention-days: 30
        if-no-files-found: ignore
